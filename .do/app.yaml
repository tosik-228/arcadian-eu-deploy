# DigitalOcean App Platform spec — the source of truth for the arcadian-eu app.
# Applied automatically by .github/workflows/deploy.yml on every push to main
# (digitalocean/app_action picks this file up from its default location).
#
# The contact form posts straight to https://werfvolt.be/api/public/leads/form
# (CORS-limited, throttled and honeypotted on the werfvolt side), so this app
# is a pure static site — no functions, no secrets.
name: arcadian-eu
region: fra
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
features:
  - buildpack-stack=ubuntu-22
# NB: keep this spec structurally identical to the live app — the CI token has
# app read/update only, and DigitalOcean 403s a spec that adds or removes
# components (do such changes once in the console, then mirror them here).
domains:
  - domain: arcadian-eu.com
    type: PRIMARY
  - domain: www.arcadian-eu.com
    type: ALIAS
ingress:
  rules:
    - component:
        name: arcadian-landing
      match:
        path:
          prefix: /
static_sites:
  - name: arcadian-landing
    environment_slug: html
    git:
      repo_clone_url: https://github.com/tosik-228/arcadian-eu-deploy.git
      branch: main
    source_dir: static-site
    output_dir: /
    index_document: index.html
    catchall_document: index.html
