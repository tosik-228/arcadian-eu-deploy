name: arcadian-eu
region: fra
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
features:
  - buildpack-stack=ubuntu-22
domains:
  - domain: arcadian-eu.com
    type: PRIMARY
    minimum_tls_version: "1.2"
  - domain: www.arcadian-eu.com
    type: ALIAS
    minimum_tls_version: "1.2"
ingress:
  rules:
    - component:
        name: arcadian-intake
      match:
        path:
          prefix: /api
    - component:
        name: arcadian-landing
      match:
        path:
          prefix: /
static_sites:
  - name: arcadian-landing
    environment_slug: html
    git:
      repo_clone_url: https://github.com/tosik-228/arcadian-eu-deploy.git
      branch: main
    source_dir: static-site
    output_dir: /
    index_document: index.html
    catchall_document: index.html
functions:
  - name: arcadian-intake
    git:
      repo_clone_url: https://github.com/tosik-228/arcadian-eu-deploy.git
      branch: main
    source_dir: functions
    envs:
      - key: WERFVOLT_LEAD_ENDPOINT
        value: https://werfvolt.be/api/public/leads
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: WERFVOLT_INTAKE_API_KEY
        value: REPLACE_IN_DIGITALOCEAN_APP_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
