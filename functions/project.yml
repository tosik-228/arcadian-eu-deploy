environment:
  WERFVOLT_LEAD_ENDPOINT: "${WERFVOLT_LEAD_ENDPOINT}"
  WERFVOLT_INTAKE_API_KEY: "${WERFVOLT_INTAKE_API_KEY}"

packages:
  - name: intake
    functions:
      - name: contact
        runtime: nodejs:24
        web: true
        limits:
          timeout: 5000
          memory: 128
          logs: 64
